<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#ffffff" />
<title>Play the gameboard</title>
<style>
  :root {
    --bg: #ffffff;
    --ink: #111214;
    --muted: #6b7079;
    --line: #e9ebee;
    --pill: #f1f2f5;
    --card: #ffffff;
    --panel: #f7f8fa;
    --gold-1: #f8df6b;
    --gold-2: #e7b324;
    --gold-3: #b07a08;
    --silver-1: #f3f4f6;
    --silver-2: #d6d9de;
    --silver-3: #9ea3ad;
    --silver-4: #7a7f88;
    --accent: #e91e63;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body {
    min-height: 100vh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .app {
    max-width: 430px;
    margin: 0 auto;
    padding: 0 18px 24px;
  }

  /* Header */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 48px;
    padding: 0 2px;
    position: relative;
  }
  .icon-btn {
    width: 36px; height: 36px;
    display: grid; place-items: center;
    background: none; border: 0; cursor: pointer;
    color: var(--ink);
  }
  .icon-btn svg { width: 22px; height: 22px; }
  .title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }
  .topbar::after {
    content: "";
    position: absolute;
    left: -18px; right: -18px; bottom: 0;
    height: 2px;
    background: linear-gradient(90deg, #7b5cff 0%, #e91e63 55%, #ff9a3c 100%);
    opacity: .85;
  }

  /* Stats pills */
  .stats {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--pill);
    border-radius: 999px;
    padding: 8px 14px;
    font-weight: 600;
    font-size: 15px;
    color: #1d1f22;
  }
  .pill .grid-ico {
    width: 18px; height: 18px;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;
  }
  .pill .grid-ico i {
    display: block;
    background: #e91e63;
    border-radius: 1px;
  }
  .pill .coin-ico {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #f6e27a 0%, #e7b324 55%, #b07a08 100%);
    display: grid; place-items: center;
    color: #5a3b00;
    font-weight: 800;
    font-size: 12px;
    border: 1px solid #c9911c;
  }

  /* Gameboard heading */
  .heading {
    text-align: center;
    margin: 18px 0 6px;
  }
  .heading h1 {
    margin: 0;
    font-size: 22px;
    line-height: 1.15;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .heading .played {
    margin-top: 6px;
    font-size: 13px;
    color: var(--muted);
  }

  /* Board panel */
  .board {
    margin-top: 14px;
    background: var(--panel);
    border-radius: 22px;
    padding: 14px 12px 18px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.02) inset;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  /* Tile card */
  .tile {
    position: relative;
    background: #fff;
    border-radius: 14px;
    aspect-ratio: 1 / 1;
    display: grid;
    place-items: center;
    box-shadow: 0 1px 2px rgba(16,24,40,.06), 0 0 0 1px rgba(16,24,40,.04);
    cursor: pointer;
    transition: transform .15s ease;
    user-select: none;
    -webkit-user-select: none;
    padding: 0;
    border: 0;
    font: inherit;
    color: inherit;
  }
  /* aspect-ratio fallback for older Safari */
  @supports not (aspect-ratio: 1 / 1) {
    .tile::before {
      content: "";
      display: block;
      padding-top: 100%;
      grid-area: 1 / 1;
    }
    .tile > * { grid-area: 1 / 1; }
  }
  .tile:active { transform: scale(.97); }

  /* Coin shapes */
  .coin {
    width: 82%;
    height: 82%;
    display: grid;
    place-items: center;
    position: relative;
    color: #fff;
    font-weight: 800;
    font-size: 18px;
    text-shadow: 0 1px 0 rgba(0,0,0,.25);
  }
  .coin .label {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1;
    gap: 2px;
  }
  .coin .sym {
    font-size: 13px;
    font-weight: 800;
    opacity: .95;
  }
  .coin .val {
    font-size: 19px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }

  /* Masked state: big centered "?" in every tile. The label (Đ + value)
     is hidden until the tile's parent gets .revealed. */
  .coin .label {
    opacity: 0;
    transition: opacity .25s ease;
  }
  .coin::after {
    content: "?";
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    font-size: 34px;
    font-weight: 800;
    color: #ffffff;
    text-shadow: 0 2px 0 rgba(0,0,0,.25);
    transition: opacity .25s ease;
    z-index: 2;
    pointer-events: none;
  }
  .tile.revealed .coin::after { opacity: 0; }
  .tile.revealed .coin .label { opacity: 1; }

  /* Reveal pulse for the label when a tile flips */
  @keyframes revealPulse {
    0%   { transform: scale(.4);  opacity: 0; }
    55%  { transform: scale(1.18); opacity: 1; }
    100% { transform: scale(1);    opacity: 1; }
  }
  .tile.revealed .coin .label {
    animation: revealPulse 520ms cubic-bezier(.2,.9,.3,1.4);
  }

  /* Silver circular coin */
  .shape-circle {
    border-radius: 50%;
    background:
      radial-gradient(circle at 32% 28%, #ffffff 0%, #e3e5ea 35%, #b9bdc6 60%, #878c95 100%);
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,.35),
      inset 0 -6px 12px rgba(0,0,0,.12),
      0 1px 2px rgba(0,0,0,.12);
  }
  /* Subtle "texture" via repeating gradient */
  .shape-circle::before {
    content: "";
    position: absolute; inset: 6%;
    border-radius: 50%;
    background:
      repeating-radial-gradient(circle at 30% 30%, rgba(255,255,255,.05) 0 2px, rgba(0,0,0,.03) 2px 4px);
    mix-blend-mode: overlay;
    opacity: .6;
    pointer-events: none;
  }

  /* Octagon coin */
  .shape-octagon {
    background:
      radial-gradient(circle at 35% 30%, #f1f2f5 0%, #d6d9de 45%, #a4a8b1 80%, #7a7f88 100%);
    clip-path: polygon(
      30% 0%, 70% 0%,
      100% 30%, 100% 70%,
      70% 100%, 30% 100%,
      0% 70%, 0% 30%
    );
    box-shadow: inset 0 -6px 12px rgba(0,0,0,.12);
  }

  /* Rounded square coin (the 250 tile) */
  .shape-square {
    border-radius: 14px;
    background:
      radial-gradient(circle at 35% 28%, #e6e8ec 0%, #c6c9d0 55%, #8f949d 100%);
    box-shadow: inset 0 -6px 12px rgba(0,0,0,.15), inset 0 0 0 2px rgba(255,255,255,.25);
  }

  /* Gold variant */
  .tile.gold .coin.shape-circle {
    background:
      radial-gradient(circle at 32% 28%, #fff7c8 0%, #f4d661 30%, #e0a91e 65%, #9e6a06 100%);
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,.45),
      inset 0 -6px 12px rgba(80,40,0,.25),
      0 1px 3px rgba(160,100,0,.3);
  }
  .tile.gold {
    box-shadow: 0 0 0 2px #e7b324, 0 2px 8px rgba(231,179,36,.35);
  }

  /* Icon content inside the coin */
  .coin svg.ico {
    width: 36%;
    height: 36%;
    margin-bottom: 1px;
    filter: drop-shadow(0 1px 0 rgba(0,0,0,.2));
  }

  /* Emoji badge */
  .badge-emoji {
    position: absolute;
    top: -2px; left: -2px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #f7c948;
    border: 2px solid #fff;
    display: grid; place-items: center;
    font-size: 14px;
    line-height: 1;
    box-shadow: 0 1px 2px rgba(0,0,0,.15);
  }

  /* Surprise overlay */
  .toast {
    position: fixed;
    left: 50%;
    bottom: 32px;
    transform: translateX(-50%) translateY(20px);
    background: #111;
    color: #fff;
    padding: 12px 18px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease, transform .25s ease;
    z-index: 20;
    box-shadow: 0 6px 20px rgba(0,0,0,.25);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Play again button */
  .play-again {
    display: block;
    margin: 20px auto 0;
    background: linear-gradient(135deg, #7b5cff 0%, #e91e63 55%, #ff9a3c 100%);
    color: #fff;
    border: 0;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .1px;
    padding: 14px 34px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(233, 30, 99, .28);
    transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
  }
  .play-again:active {
    transform: scale(.97);
    box-shadow: 0 3px 10px rgba(233, 30, 99, .25);
  }

  /* Not yet picked tiles stay silver; picked = gold */
  .tile.dim .coin { filter: grayscale(.05) brightness(.98); }

  /* Confetti burst */
  .confetti {
    position: fixed;
    top: 0; left: 0;
    width: 9px; height: 14px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 50;
    will-change: transform, opacity;
    animation: confetti-fly 1500ms ease-out forwards;
  }
  @keyframes confetti-fly {
    0%   { transform: translate(var(--x), var(--y)) rotate(0deg); opacity: 1; }
    70%  { opacity: 1; }
    100% {
      transform:
        translate(calc(var(--x) + var(--dx)), calc(var(--y) + var(--dy) + 260px))
        rotate(var(--rot));
      opacity: 0;
    }
  }

  @media (max-width: 360px) {
    .coin .val { font-size: 17px; }
    .coin .sym { font-size: 12px; }
  }
</style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="topbar">
      <button class="icon-btn" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="title">Play the gameboard</div>
      <button class="icon-btn" aria-label="Share">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13"/><path d="M7 8l5-5 5 5"/><path d="M5 21h14"/></svg>
      </button>
    </header>

    <!-- Stats pills -->
    <div class="stats">
      <div class="pill">
        <span class="grid-ico" aria-hidden="true">
          <i></i><i></i><i></i>
          <i></i><i></i><i></i>
          <i></i><i></i><i></i>
        </span>
        <span id="playCount">0 plays</span>
      </div>
      <div class="pill">
        <span class="coin-ico">Đ</span>
        <span id="balance">77,883</span>
      </div>
    </div>

    <!-- Heading -->
    <div class="heading">
      <h1>Gameboard<br/><span id="boardDate">Wednesday 08 April</span></h1>
      <div class="played" id="playedLine">Played on Saturday 11 April at 15:24</div>
    </div>

    <!-- Board -->
    <div class="board">
      <div class="grid" id="grid">
        <button type="button" class="tile" data-v="200"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">200</span></div></div></button>
        <button type="button" class="tile" data-v="155"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">155</span></div></div></button>
        <button type="button" class="tile" data-v="155"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">155</span></div></div></button>
        <button type="button" class="tile" data-v="1000"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">1,000</span></div></div></button>

        <button type="button" class="tile" data-v="1000"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">1,000</span></div></div></button>
        <button type="button" class="tile" data-v="250"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">250</span></div></div></button>
        <button type="button" class="tile" data-v="155"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">155</span></div></div></button>
        <button type="button" class="tile" data-v="175"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">175</span></div></div></button>

        <button type="button" class="tile" data-v="155"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">155</span></div></div></button>
        <button type="button" class="tile" data-v="150"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">150</span></div></div></button>
        <button type="button" class="tile" data-v="225"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">225</span></div></div></button>
        <button type="button" class="tile" data-v="150"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">150</span></div></div></button>

        <button type="button" class="tile" data-v="160"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">160</span></div></div></button>
        <button type="button" class="tile" data-v="100"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">100</span></div></div></button>
        <button type="button" class="tile" data-v="583"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">583</span></div></div></button>
        <button type="button" class="tile" data-v="1000"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">1,000</span></div></div></button>

        <button type="button" class="tile" data-v="175"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">175</span></div></div></button>
        <button type="button" class="tile" data-v="150"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">150</span></div></div></button>
        <button type="button" class="tile" data-v="500"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">500</span></div></div></button>
        <button type="button" class="tile" data-v="150"><div class="coin shape-circle"><div class="label"><span class="sym">Đ</span><span class="val">150</span></div></div></button>
      </div>
    </div>

    <button class="play-again" id="resetBtn">Play again</button>
  </div>

  <div class="toast" id="toast">You won Đ175!</div>

<script>
  (function () {
    var toast = document.getElementById('toast');
    var playCountEl = document.getElementById('playCount');
    var balanceEl = document.getElementById('balance');
    var playedLineEl = document.getElementById('playedLine');
    var resetBtn = document.getElementById('resetBtn');
    var tiles = document.querySelectorAll('.tile');

    var picked = false;
    var plays = 0;
    var balance = 77883;

    function fmt(n) { return n.toLocaleString('en-US'); }

    // Pool of prize values; same count and distribution as the original
    // board. Shuffled on every reset so each round is a new surprise.
    var VALUES = [
      200, 155, 155, 1000,
      1000, 250, 155, 175,
      155, 150, 225, 150,
      160, 100, 583, 1000,
      175, 150, 500, 150
    ];

    function shuffle(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
      }
      return a;
    }

    function applyValues(values) {
      tiles.forEach(function (el, i) {
        var v = values[i];
        el.setAttribute('data-v', v);
        var val = el.querySelector('.val');
        if (val) val.textContent = fmt(v);
      });
    }

    function updatePlayedLine() {
      var now = new Date();
      var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var hh = String(now.getHours()).padStart(2,'0');
      var mm = String(now.getMinutes()).padStart(2,'0');
      playedLineEl.textContent = 'Played on ' + days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()] + ' at ' + hh + ':' + mm;
    }

    var CONFETTI_COLORS = ['#ff4d6d','#ffa62b','#ffd23f','#2ec4b6','#3a86ff','#b5179e','#8ac926'];
    function fireConfetti(originEl) {
      var rect = originEl.getBoundingClientRect();
      var cx = rect.left + rect.width / 2;
      var cy = rect.top + rect.height / 2;
      var count = 48;
      for (var i = 0; i < count; i++) {
        var p = document.createElement('div');
        p.className = 'confetti';
        var angle = (Math.PI * 2 * i) / count + Math.random() * 0.4;
        var speed = 90 + Math.random() * 180;
        var dx = Math.cos(angle) * speed;
        var dy = Math.sin(angle) * speed - 80; // bias upward
        p.style.setProperty('--x', cx + 'px');
        p.style.setProperty('--y', cy + 'px');
        p.style.setProperty('--dx', dx + 'px');
        p.style.setProperty('--dy', dy + 'px');
        p.style.setProperty('--rot', (Math.random() * 900 - 450) + 'deg');
        p.style.background = CONFETTI_COLORS[i % CONFETTI_COLORS.length];
        p.style.animationDelay = (Math.random() * 60) + 'ms';
        document.body.appendChild(p);
        (function (node) {
          setTimeout(function () { if (node.parentNode) node.parentNode.removeChild(node); }, 1800);
        })(p);
      }
    }

    function pickTile(tileEl) {
      if (picked) return;
      picked = true;
      var value = parseInt(tileEl.getAttribute('data-v'), 10) || 0;

      // Reveal every tile; mark the picked one gold.
      tiles.forEach(function (el) { el.classList.add('revealed'); });
      tileEl.classList.add('gold');

      fireConfetti(tileEl);

      plays += 1;
      balance += value;
      playCountEl.textContent = plays + (plays === 1 ? ' play' : ' plays');
      balanceEl.textContent = fmt(balance);
      updatePlayedLine();

      toast.textContent = 'You won \u0110' + fmt(value) + '!';
      toast.classList.add('show');
      setTimeout(function () { toast.classList.remove('show'); }, 2400);

      if (navigator.vibrate) navigator.vibrate([15, 40, 15]);
    }

    tiles.forEach(function (el) {
      el.addEventListener('click', function () { pickTile(el); });
    });

    resetBtn.addEventListener('click', function () {
      picked = false;
      tiles.forEach(function (el) {
        el.classList.remove('gold', 'revealed');
      });
      // Randomise the prize layout for the next round.
      applyValues(shuffle(VALUES));
      toast.classList.remove('show');
    });
  })();
</script>
</body>
</html>
